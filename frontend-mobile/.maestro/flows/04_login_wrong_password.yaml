appId: com.mysmartstudy.app
name: Login Rejects Wrong Password
tags:
  - auth
---
- clearState
- launchApp
- tapOn: "Email"
- inputText: "student1@mysmartstudy.com"
- hideKeyboard
- tapOn: "Password"
- inputText: "definitely-wrong-password"
- hideKeyboard
- tapOn:
    text: "Sign In"
    index: 0
# Expect an error snackbar — either "Incorrect password." or Firebase's generic message.
- extendedWaitUntil:
    visible:
      text: ".*(Incorrect password|invalid-credential|password is invalid|Login failed).*"
    timeout: 15000
# Should still be on the login screen
- assertVisible: "Sign In"
