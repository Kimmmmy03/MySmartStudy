appId: com.mysmartstudy.app
name: Student Bottom Nav Navigation
tags:
  - navigation
  - student
---
- runFlow:
    file: login.subflow.yaml
    env:
      TEST_EMAIL: student1@mysmartstudy.com
      TEST_PASSWORD: Test1234!

# Courses tab
- tapOn: "Courses"
- assertVisible: "Courses"

# Schedule tab
- tapOn: "Schedule"
- assertVisible: "Schedule"

# Maps tab
- tapOn: "Maps"
- assertVisible: "Maps"

# Profile tab
- tapOn: "Profile"
- assertVisible: "Profile"

# Back to Home
- tapOn: "Home"
- assertVisible: "Home"
